<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>Powell's Problem</title>
</head>
<body>
    <div class="container mx-auto">
        <h1 class="text-2xl font-bold">Taylor Rule Calculation</h1>
        <form id="rateForm" class="mt-4">
            <label for="inflation" class="block">
                Enter Inflation Rate (π_t):
                <input type="number" id="inflation" class="border border-gray-300 p-2 rounded" step="0.01">
            </label>
            <label for="naturalRate" class="block mt-2">
                Enter Natural Unemployment Rate (u*):
                <input type="number" id="naturalRate" class="border border-gray-300 p-2 rounded" step="0.01">
            </label>
            <label for="interestRate" class="block mt-2">
                Enter Interest Rate (i_t):
                <input type="number" id="interestRate" class="border border-gray-300 p-2 rounded" step="0.01">
            </label>
            <button type="submit" class="mt-4 bg-blue-500 text-white p-2 rounded">Submit</button>
        </form>
        <div id="errorMessage" class="hidden text-red-500 mt-4"></div>
        <div id="successMessage" class="hidden text-green-500 mt-4">Submitted successfully!</div>
    </div>
    <script>
        const form = document.getElementById('rateForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            const inflation = parseFloat(document.getElementById('inflation').value);
            const naturalRate = parseFloat(document.getElementById('naturalRate').value);
            const enteredRate = parseFloat(document.getElementById('interestRate').value);
            const expectedRate = 0.75 + inflation + 0.5 * (inflation - 2) - (4.3 - naturalRate);

            if (Math.abs(enteredRate - expectedRate) > 0.05) {
                errorMessage.textContent = `Entered rate is inconsistent. Expected rate: ${expectedRate.toFixed(2)}`;
                errorMessage.classList.remove('hidden');
            } else {
                // Proceed with existing submission behavior
                successMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
