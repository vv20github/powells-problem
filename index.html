<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYU Stern | Macro Forecast Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border-t-4 border-[#57068c]">
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-gray-800">You are a member of the FOMC. Enter your forecasts and the interest rate implied by the Taylor rule. </h1>
            <p class="text-sm text-gray-600 mt-2">
  \[
    i_t = 0.75 + \pi_t + 0.5(\pi_t - 2) - (4.3 - u^*)
  \]
</p>           
        </div>

        <form id="forecastForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Name (optional)</label>
                <input type="text" name="name"
                    class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md focus:ring-[#57068c] focus:border-[#57068c] outline-none transition"
                    placeholder="e.g. Jane Doe">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Inflation, 3-6 months out, \( \pi_t \) (%)</label>
                <input type="number" step="0.1" name="inflation" required 
                    class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md focus:ring-[#57068c] focus:border-[#57068c] outline-none transition"
                    placeholder="e.g. 2.5">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Natural Unemployment Rate \( u^* \), 3-6 months out (%)</label>
                <input type="number" step="0.1" name="unemployment" required 
                    class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md focus:ring-[#57068c] focus:border-[#57068c] outline-none transition"
                    placeholder="e.g. 3.8">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Taylor Rule-implied Interest Rate (%)</label>
                <input type="number" step="0.01" name="interestrate" required 
                    class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-md focus:ring-[#57068c] focus:border-[#57068c] outline-none transition"
                    placeholder="e.g. 3.8">
            </div>

            <button type="submit" 
                class="w-full bg-[#57068c] text-white font-bold py-3 px-4 rounded-md hover:bg-[#450570] transition-colors duration-200 shadow-md">
                Submit Forecast
            </button>
        </form>

        <div id="successMsg" class="hidden mt-4 p-4 bg-green-100 text-green-700 text-center rounded-md">
            Data transmitted. Check the lecture slide for the updated consensus.
        </div>
    </div>

    <script>
        const form = document.getElementById('forecastForm');
        const msg = document.getElementById('successMsg');
        
  // Taylor-rule checker (based on the equation shown on the page):
  // i_t = 0.75 + π_t + 0.5(π_t - 2) - (4.3 - u*)
  //
  // This script:
  // - Computes the implied i_t from the entered inflation + natural unemployment
  // - Compares it to the user-entered "Taylor Rule-implied Interest Rate"
  // - Shows an inline error if they don’t match (within a small tolerance)
  // - Blocks submit until it matches

  (function () {
    const form = document.getElementById('forecastForm');

    const inflationEl = form.querySelector('input[name="inflation"]');
    const uStarEl = form.querySelector('input[name="unemployment"]');
    const iUserEl = form.querySelector('input[name="interestrate"]');

    // Add a small helper text area under the interest-rate field
    const hint = document.createElement('div');
    hint.id = 'taylorHint';
    hint.className = 'mt-2 text-sm';
    iUserEl.parentElement.appendChild(hint);

    // (Optional) add an "autofill" button next to the interest-rate label
    const label = iUserEl.parentElement.querySelector('label');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className =
      'ml-2 inline-flex items-center px-2 py-1 text-xs font-semibold rounded ' +
      'bg-gray-100 hover:bg-gray-200 text-gray-700 border border-gray-200';
    btn.textContent = 'Auto-fill';
    label.appendChild(btn);

    function toNum(el) {
      const v = parseFloat(el.value);
      return Number.isFinite(v) ? v : null;
    }

    function impliedTaylorRate(pi, uStar) {
      // i_t = 0.75 + π + 0.5(π - 2) - (4.3 - u*)
      return 0.75 + pi + 0.5 * (pi - 2) - (4.3 - uStar);
    }

    function updateCheck() {
      const pi = toNum(inflationEl);
      const uStar = toNum(uStarEl);
      const iUser = toNum(iUserEl);

      // Clear state if not enough inputs yet
      if (pi === null || uStar === null) {
        hint.textContent = '';
        hint.classList.remove('text-red-700', 'text-green-700');
        iUserEl.setCustomValidity('');
        return { ok: true, implied: null };
      }

      const implied = impliedTaylorRate(pi, uStar);
      const impliedRounded = Math.round(implied * 100) / 100; // display as 2dp

      // Allow a small tolerance (since they might round differently)
      const tolerance = 0.05; // +/- 0.05 percentage points
      const diff = Math.abs(iUser - implied);

      if (diff <= tolerance) {
        hint.textContent = `Looks good. Taylor-implied iₜ ≈ ${impliedRounded.toFixed(2)}%`;
        hint.classList.remove('text-red-700', 'text-gray-600');
        hint.classList.add('text-green-700');
        iUserEl.setCustomValidity('');
        return { ok: true, implied };
      } else {
        hint.textContent = `Check your Taylor calculation. Expected iₜ ≈ ${impliedRounded.toFixed(2)}% (±${tolerance}).`;
        hint.classList.remove('text-green-700', 'text-gray-600');
        hint.classList.add('text-red-700');
        iUserEl.setCustomValidity('Please check the interest rate calculation.');
        return { ok: false, implied };
      }
    }

    // Live validation as the user types
    ['input', 'change', 'blur'].forEach(evt => {
      inflationEl.addEventListener(evt, updateCheck);
      uStarEl.addEventListener(evt, updateCheck);
      iUserEl.addEventListener(evt, updateCheck);
    });

    // Autofill button sets the interest-rate input to the implied value (2dp)
    btn.addEventListener('click', () => {
      const pi = toNum(inflationEl);
      const uStar = toNum(uStarEl);
      if (pi === null || uStar === null) return;
      const implied = impliedTaylorRate(pi, uStar);
      iUserEl.value = (Math.round(implied * 100) / 100).toFixed(2);
      updateCheck();
    });

    // Final gate on submit: prevent submit if invalid
    form.addEventListener('submit', (e) => {
      const { ok } = updateCheck();
      if (!ok) {
        e.preventDefault();
        iUserEl.reportValidity();
      }
    });
  })();



        form.addEventListener('submit', e => {
            e.preventDefault();
            const data = new FormData(form);
            
            // Google Apps Script Web App URL
            const scriptURL = 'https://script.google.com/macros/s/AKfycbw1oUb5pyfvAkteabgiP01W64pWTl7n8cV634HwwFG6S4S-_oGbKdHqu7nKDYAOzz26/exec';

            // GitHub Pages runs on a different origin, so avoid CORS issues
            // (tradeoff: you can't reliably read the response body/status)
            fetch(scriptURL, { method: 'POST', body: data, mode: 'no-cors' })
                .then(() => {
                    form.classList.add('hidden');
                    msg.classList.remove('hidden');
                })
                .catch(error => console.error('Error!', error.message));
        });
    </script>
</body>
</html>
